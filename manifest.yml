modules:
  jira:projectSettingsPage:
    - key: testrail-test-run-project-settings-page
      resource: main-settings-page
      title: TestRail Configuration
      render: native
      resolver: 
        function: resolver
  jira:issuePanel:
    - key: testrail-test-run-issue-panel
      resource: main-panel
      resolver:
        function: resolver
      render: native
      title: Test Run
      icon: https://imahiro-t.github.io/testrail-jira-extension/testrail.png
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main-panel
    path: src/frontend/panel/index.jsx
  - key: main-settings-page
    path: src/frontend/settings/index.jsx
app:
  runtime:
    name: nodejs18.x
  id: ari:cloud:ecosystem::app/7fa79569-d2e8-47f4-99f3-d32007fae97a
permissions:
  external:
    fetch:
      backend:
        - '*'
  scopes:
    - manage:jira-project
    - read:jira-work
    - write:jira-work