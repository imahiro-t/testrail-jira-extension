modules:
  jira:projectSettingsPage:
    - key: testrail-test-run-project-settings-page
      resource: main-settings-page
      title: TestRail settings
      render: native
      resolver: 
        function: resolver
  jira:customField:
    - key: testrail-test-run-custom-field
      name: TestRail
      description: Custom field for TestRail's Test Run.
      type: object
      formatter: 
        expression: ""
      schema:
        properties:
          project:
            type: object
            searchAlias: Project
          run:
            type: object
            searchAlias: Run
      render: native
      resource: main-resource
      edit:
        resource: main-resource
        render: native
      resolver:
        function: resolver
  function:
    - key: resolver
      handler: index.handler
resources:
  - key: main-resource
    path: src/frontend/index.jsx
  - key: main-settings-page
    path: src/frontend/settings/index.jsx
app:
  runtime:
    name: nodejs18.x
  id: ari:cloud:ecosystem::app/7fa79569-d2e8-47f4-99f3-d32007fae97a
permissions:
  external:
    fetch:
      backend:
        - '*'
  scopes:
    - manage:jira-project
    - read:jira-work